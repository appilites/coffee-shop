<!--
  Supabase → Authentication → Email Templates → "Magic link"
  Link-only sign-in.

  Required: {{ .ConfirmationURL }}
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Your sign-in link — Druids Nutrition</title>
</head>
<body style="margin:0;padding:0;background-color:#181511;font-family:Georgia,'Times New Roman',serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#181511;padding:24px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background-color:#252018;border:1px solid #3d3528;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="padding:28px 28px 20px;text-align:center;background:linear-gradient(180deg,#2f2820 0%,#252018 100%);border-bottom:1px solid #3d3528;">
              <h1 style="margin:0;font-size:24px;font-weight:700;color:#f5f0e8;">Druids Nutrition</h1>
              <p style="margin:8px 0 0;font-size:14px;color:#a89f94;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">Your sign-in link is ready</p>
            </td>
          </tr>
          <tr>
            <td style="padding:28px;">
              <p style="margin:0 0 24px;font-size:15px;line-height:1.55;color:#c4bcb3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
                Tap the button below to sign in. This link expires soon for your security.
              </p>
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 auto;">
                <tr>
                  <td style="border-radius:8px;background:linear-gradient(180deg,#d4a84b 0%,#a67c32 100%);">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;font-size:15px;font-weight:600;color:#1a1612;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">Sign in to Druids Nutrition</a>
                  </td>
                </tr>
              </table>
              <p style="margin:24px 0 0;font-size:12px;color:#6b655c;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
                If you didn&rsquo;t request this email, you can safely ignore it.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px;background-color:#1a1612;border-top:1px solid #3d3528;text-align:center;">
              <p style="margin:0;font-size:11px;color:#6b655c;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">Druids Nutrition</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
